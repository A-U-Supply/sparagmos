name: Sparagmos

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Recipe name (leave empty for random)'
        default: ''
      images:
        description: 'Comma-separated image URLs (optional)'
        default: ''
      poster:
        description: 'Filter by poster user ID'
        default: ''
      age:
        description: 'Filter by image age'
        default: ''
      freshness:
        description: 'Filter by image freshness'
        default: ''
      rating:
        description: 'Filter recipes by rating (comma-separated: top,positive,unrated,underdogs)'
        default: ''

jobs:
  sparagmos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick netpbm ffmpeg potrace

      - name: Install primitive
        run: go install github.com/fogleman/primitive@latest

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run sparagmos
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          CMD="python -m sparagmos"
          if [ -n "${{ inputs.recipe }}" ]; then
            CMD="$CMD --recipe ${{ inputs.recipe }}"
          fi
          if [ -n "${{ inputs.images }}" ]; then
            CMD="$CMD --image-urls ${{ inputs.images }}"
          fi
          if [ -n "${{ inputs.poster }}" ]; then
            CMD="$CMD --poster ${{ inputs.poster }}"
          fi
          if [ -n "${{ inputs.age }}" ]; then
            CMD="$CMD --age ${{ inputs.age }}"
          fi
          if [ -n "${{ inputs.freshness }}" ]; then
            CMD="$CMD --freshness ${{ inputs.freshness }}"
          fi
          if [ -n "${{ inputs.rating }}" ]; then
            CMD="$CMD --rating ${{ inputs.rating }}"
          fi
          $CMD

      - name: Sync ratings and stars from worker
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://sparagmos-slash-command.ausupply.workers.dev/api/ratings -o ratings.json || echo "{}" > ratings.json
          curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://sparagmos-slash-command.ausupply.workers.dev/api/stars -o stars.json || echo "[]" > stars.json

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json ratings.json stars.json
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            for i in 1 2 3 4 5; do
              # Mixed reset to remote tip, then re-add ONLY state files.
              # --soft would preserve the entire stale index from checkout,
              # silently reverting any PRs merged during this workflow run.
              git fetch origin main
              git reset origin/main
              git add state.json ratings.json stars.json
              git diff --cached --quiet && { echo "State already up-to-date."; break; }
              git commit -m "chore: update state ($(date -u +%Y-%m-%d)) [skip ci]"
              git push && break
              echo "Push failed (attempt $i), retrying..."
              sleep $((RANDOM % 10 + 5))
            done
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          RECIPE="${{ inputs.recipe }}"
          if [ -z "$RECIPE" ]; then
            RECIPE="random"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"img-junkyard\", \"text\": \":x: Sparagmos run failed (recipe: ${RECIPE}). <${RUN_URL}|View logs>\"}"
