name: Glim Drift
description: >
  Illusion register, two images woven into one crawling surface: a hex
  field of drift wheels whose dark pole is image A's shadows and light
  pole is image B's highlights, black -> dark -> white -> light around
  each wheel. A's local detail sizes the wheels — busy regions tighten,
  flat regions open to reveal the photo — and its gradient sets each
  wheel's spin. The surface never stops crawling. Single output, glim batch.

inputs: 2

steps:
  - type: driftring
    images: [a, b]
    into: canvas
    params:
      rings: [3, 5]
      segments: [11, 16]
      wheels: [3, 6]
