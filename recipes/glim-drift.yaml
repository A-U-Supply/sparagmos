name: Glim Drift
description: >
  Illusion register, two images: A's silhouette is built out of a hex
  field of small drift wheels — black, dark, white, light steps in A's
  own palette, direction alternating wheel to wheel — floating over B,
  dimmed. The shape is the image; the surface never stops crawling.
  Single output, glim batch.

inputs: 2

steps:
  - type: driftring
    images: [a, b]
    into: canvas
    params:
      rings: [4, 8]
      segments: [16, 28]
      hue_spread: [0.08, 0.2]
      wheels: [5, 9]
