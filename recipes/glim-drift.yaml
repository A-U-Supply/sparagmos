name: Glim Drift
description: >
  Illusion register, two images: B's brightest points seed a field of
  drift wheels (many wheels crawl harder than one), and A supplies the
  palette. Each wheel cycles black, dark, white, light with direction
  alternating ring to ring — hold still and look just beside it. Single
  output, glim batch.

inputs: 2

steps:
  - type: driftring
    images: [a, b]
    into: canvas
    params:
      rings: [9, 15]
      segments: [18, 30]
      hue_spread: [0.08, 0.2]
      wheels: [3, 7]
