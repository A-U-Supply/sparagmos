name: Neural Tapestry
description: >
  Three of the five inputs are deepdreamed — A, B, and C each acquire the network's
  hallucinated forms at slightly different intensities. Those three dreamed images
  are Voronoi-fragmented together: the tiling algorithm cuts irregular cells through
  all three hallucinated surfaces, mixing them into a mosaic whose seams follow no
  photographic logic. D provides a luminance mask, its bright zones exposing or
  suppressing sections of the Voronoi dream-composite. E is scatter-collaged in,
  flinging raw fragments across the dreamed tapestry — the only undreamed material
  puncturing the neural surface. Spectral bandpass filtering isolates the
  mid-frequency structure of the hallucinations. Jpeg destruction seals the weave.

inputs: 5

steps:
  - type: deepdream
    image: a
    params:
      iterations: [8, 14]
      octave_scale: [1.3, 1.4]
      jitter: [20, 36]
      learning_rate: [0.008, 0.018]

  - type: deepdream
    image: b
    params:
      iterations: [10, 16]
      octave_scale: [1.4, 1.5]
      jitter: [28, 44]
      learning_rate: [0.012, 0.022]

  - type: deepdream
    image: c
    params:
      iterations: [6, 12]
      octave_scale: [1.2, 1.4]
      jitter: [16, 32]
      learning_rate: [0.006, 0.015]

  - type: fragment
    images: [a, b, c]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [16, 36]
      mix_ratio: [0.6, 0.9]
      gap: [0, 4]

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: luminance
      threshold: [95, 150]
      feather: [6, 13]
      invert: false

  - type: collage
    images: [canvas, e]
    into: canvas
    params:
      layout: scatter
      rotation: [10, 50]
      scale_variance: [0.10, 0.35]

  - type: deepdream
    image: canvas
    params:
      iterations: [5, 10]
      octave_scale: [1.2, 1.4]
      jitter: [16, 28]
      learning_rate: [0.005, 0.012]

  - type: spectral
    image: canvas
    params:
      operation: bandpass
      amount: [0.3, 0.6]

  - type: mask_composite
    images: [canvas, b]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 140]
      feather: [5, 12]
      invert: false

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [12, 28]
