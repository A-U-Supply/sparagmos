name: Dream Dissolve
description: >
  Two images each sent through deep neural hallucination — the network finds
  eyes and feathers in everything, turning surfaces into living architectures.
  Overlaid together, the dreams interfere. A noise mask controls where one
  bleeds into the other. JPEG compression melts the boundary into something
  that feels remembered rather than seen.

inputs: 2

steps:
  - type: deepdream
    image: a
    params:
      iterations: [8, 18]
      octave_scale: [1.3, 1.6]
      jitter: [20, 48]

  - type: deepdream
    image: b
    params:
      iterations: [6, 14]
      octave_scale: [1.2, 1.5]
      jitter: [16, 40]

  - type: blend
    images: [a, b]
    into: canvas
    params:
      mode: overlay
      strength: [0.6, 0.9]

  - type: mask_composite
    images: [canvas, b]
    into: canvas
    params:
      mask_source: noise
      threshold: [80, 160]
      feather: [10, 25]

  - type: spectral
    image: canvas
    params:
      mode: bandpass
      low_freq: [0.1, 0.25]
      high_freq: [0.5, 0.8]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 4]
      iterations: [12, 28]
