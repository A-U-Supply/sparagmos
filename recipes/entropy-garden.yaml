name: Entropy Garden
description: >
  Five images each deepdreamed into proliferating hallucinations before being
  assembled into a mosaic. Edge masking cuts the dream-mosaic against one of
  the hallucinated parents. Voronoi fragmentation scatters the cells like seeds.
  Difference blending inverts the collisions into spectral negatives. Jpeg destroy
  composts the garden into its final state of productive decay.

inputs: 5

steps:
  - type: deepdream
    image: a
    params:
      iterations: [8, 16]
      octave_scale: 1.4
      jitter: [24, 48]
      learning_rate: [0.008, 0.018]

  - type: deepdream
    image: b
    params:
      iterations: [5, 12]
      octave_scale: [1.2, 1.5]
      jitter: [16, 36]
      learning_rate: [0.005, 0.015]

  - type: deepdream
    image: c
    params:
      iterations: [10, 20]
      octave_scale: 1.5
      jitter: [32, 56]
      learning_rate: [0.01, 0.025]

  - type: deepdream
    image: d
    params:
      iterations: [6, 14]
      octave_scale: [1.3, 1.4]
      jitter: [20, 44]

  - type: deepdream
    image: e
    params:
      iterations: [4, 10]
      octave_scale: [1.2, 1.4]
      jitter: [12, 30]

  - type: collage
    images: [a, b, c, d, e]
    into: canvas
    params:
      layout: mosaic

  - type: mask_composite
    images: [canvas, a]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 155]
      feather: [6, 14]

  - type: fragment
    images: [canvas, b]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [20, 45]
      mix_ratio: [0.5, 0.8]
      gap: [1, 6]

  - type: blend
    images: [canvas, c]
    into: canvas
    params:
      mode: difference
      strength: [0.4, 0.7]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [18, 45]
