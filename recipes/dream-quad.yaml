name: Dream Quad
description: >
  Four images deepdreamed to varying intensities, then composited through
  three-level stencil. The stencil image's brightness bands — dark, mid,
  bright — each fill with a different hallucinated surface, creating a
  triptych of nested neural landscapes.

inputs: 4

steps:
  - type: deepdream
    image: a
    params:
      iterations: [12, 18]
      octave_scale: [1.3, 1.5]
      jitter: [30, 42]
      learning_rate: [0.012, 0.022]

  - type: deepdream
    image: b
    params:
      iterations: [8, 14]
      octave_scale: [1.2, 1.4]
      jitter: [24, 36]
      learning_rate: [0.008, 0.016]

  - type: deepdream
    image: c
    params:
      iterations: [6, 10]
      octave_scale: [1.2, 1.3]
      jitter: [20, 32]
      learning_rate: [0.006, 0.012]

  - type: ancient_quad
    images: [d, a, b, c]
    into: canvas
    params:
      output: random

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [2, 5]
      iterations: [8, 16]
