name: Dionysian Rite
description: >
  Ritual dismemberment through neural hallucination and analog decay.
  DeepDream tears apart with phantom forms, style transfer recursively
  enhances the hallucination, channel shifting fractures color, seam
  carving melts structure by removing the most interesting seams first,
  sonification converts wreckage to audio and back, JPEG buries remains.

vision: true

effects:
  - type: deepdream
    params:
      iterations: [8, 20]
      octave_scale: [1.3, 1.5]
      jitter: [24, 48]
      learning_rate: [0.01, 0.02]

  - type: style_transfer
    params:
      style_weight: 1000000
      content_weight: 1
      iterations: [15, 30]

  - type: channel_shift
    params:
      offset_r: [30, 100]
      offset_g: [-20, 20]
      offset_b: [-80, -30]

  - type: seam_carve
    params:
      scale_x: [0.4, 0.65]
      protect_regions: invert

  - type: sonify
    params:
      effect: echo
      intensity: [0.3, 0.6]

  - type: jpeg_destroy
    params:
      quality: [1, 3]
      iterations: [10, 35]
