name: Phantom Dream
description: >
  A and B are both deepdreamed — two photographs each colonized by the network's
  hallucinations independently. Those two dreamed surfaces are screen-blended
  together: screen mode combines the brightest values from each dream, the neural
  forms from both images merging into a composite that is lighter and stranger than
  either source. C's edge structure then cuts through this merged dream with a
  mask — the undreamed photograph carving geometry into the combined hallucination.
  D is fragmented into shards and scattered across the masked composite, raw photographic
  material puncturing the neural surface. A second edge mask from the fragmented D
  cuts final seams through the whole. Jpeg destruction and byte corruption seal
  the phantom forms permanently.

inputs: 4

steps:
  - type: deepdream
    image: a
    params:
      iterations: [10, 16]
      octave_scale: [1.3, 1.5]
      jitter: [24, 42]
      learning_rate: [0.010, 0.020]

  - type: deepdream
    image: b
    params:
      iterations: [12, 18]
      octave_scale: [1.4, 1.5]
      jitter: [28, 44]
      learning_rate: [0.012, 0.022]

  - type: blend
    images: [a, b]
    into: canvas
    params:
      mode: screen
      strength: [0.6, 0.9]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 140]
      feather: [6, 12]
      invert: false

  - type: fragment
    images: [canvas, d]
    into: canvas
    params:
      cut_mode: shatter
      pieces: [10, 25]
      mix_ratio: [0.4, 0.7]
      gap: [3, 10]

  - type: deepdream
    image: canvas
    params:
      iterations: [8, 14]
      octave_scale: [1.3, 1.4]
      jitter: [22, 36]
      learning_rate: [0.008, 0.018]

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: edges
      threshold: [95, 145]
      feather: [7, 14]
      invert: true

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [2, 5]
      iterations: [10, 22]

  - type: byte_corrupt
    image: canvas
    params:
      num_flips: [50, 120]
      mode: flip
