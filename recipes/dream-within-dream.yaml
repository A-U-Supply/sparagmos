name: Dream Within Dream
description: >
  Recursive hallucination in three passes. A is deepdreamed until the network's
  preferred forms — its eyes and feathers and fractal architectures — fully colonize
  the surface. That dreamed A is used as an edge mask to cut into B: wherever the
  hallucination drew its hardest lines, B's content is revealed, a second image
  filling the outlines of the first dream. This B-through-dreamed-A composite is
  then deepdreamed again — the network hallucinates over a surface that is already
  structured by its own previous hallucination. C's edge skeleton provides a third
  mask, cutting new geometry through the re-hallucinated composite. Pixel sort
  pours the nested dreams into vertical rivers; jpeg destruction makes them permanent.

inputs: 3

steps:
  - type: deepdream
    image: a
    params:
      iterations: [12, 18]
      octave_scale: [1.3, 1.5]
      jitter: [28, 44]
      learning_rate: [0.012, 0.022]

  - type: mask_composite
    images: [b, a]
    into: canvas
    params:
      mask_source: edges
      threshold: [100, 145]
      feather: [5, 10]
      invert: false

  - type: deepdream
    image: canvas
    params:
      iterations: [10, 16]
      octave_scale: [1.3, 1.5]
      jitter: [24, 40]
      learning_rate: [0.010, 0.020]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 135]
      feather: [6, 14]
      invert: false

  - type: deepdream
    image: canvas
    params:
      iterations: [5, 10]
      octave_scale: [1.2, 1.4]
      jitter: [16, 28]
      learning_rate: [0.005, 0.012]

  - type: mask_composite
    images: [canvas, a]
    into: canvas
    params:
      mask_source: luminance
      threshold: [95, 150]
      feather: [8, 15]
      invert: true

  - type: pixel_sort
    image: canvas
    params:
      mode: brightness
      threshold: [45, 95]
      direction: vertical

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 4]
      iterations: [14, 30]
