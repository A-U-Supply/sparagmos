name: Double Masked Collage
description: >
  A double masking sandwich: fragment, edge-mask, scatter-collage, luminance-
  mask again. Images A and B are Voronoi-fragmented — broken into organic cells,
  each cell preserving a slice of both sources. Image C's edge structure cuts
  new seams across the Voronoi fragments: a structural mask imposed on already-
  structural fragments. The edge-cut fragments are scatter-collaged with the
  original D, distributing the double-cut geometry across a loose field. Image D's
  luminance then cuts one final time through the scatter, punching tonal holes
  through the redistributed pieces. Byte corrupt and CRT distortion finish the
  double-masked surface — fragment, mask, scatter, mask again.

inputs: 4

steps:
  - type: channel_shift
    image: a
    params:
      offset_r: [20, 55]
      offset_b: [-45, -12]

  - type: spectral
    image: b
    params:
      operation: bandpass
      amount: [0.3, 0.65]

  - type: pca_decompose
    image: c
    params:
      n_components: [5, 10]
      mode: top

  - type: dither
    image: d
    params:
      method: atkinson
      palette: thermal

  - type: fragment
    images: [a, b]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [18, 40]
      mix_ratio: [0.5, 0.8]
      gap: [3, 9]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: collage
    images: [canvas, d]
    into: canvas
    params:
      layout: scatter
      rotation: [10, 45]
      scale_variance: [0.1, 0.35]

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: byte_corrupt
    image: canvas
    params:
      num_flips: [60, 140]
      mode: flip

  - type: crt_vhs
    image: canvas
    params:
      jitter_amount: [6, 16]
      color_bleed: [2.5, 6.5]
      scan_line_density: [2, 3]
