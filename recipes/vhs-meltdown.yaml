name: VHS Meltdown
description: >
  Simulates a VHS tape left in a hot car. CRT scan lines and color
  bleeding, chromatic aberration from channel shifting, finished
  with JPEG compression for digital rot on top of analog decay.

effects:
  - type: crt_vhs
    params:
      scan_line_density: [2, 4]
      jitter_amount: [3, 8]
      color_bleed: [1.0, 3.0]
      phosphor_glow: [0.05, 0.15]

  - type: channel_shift
    params:
      offset_r: [10, 40]
      offset_b: [-30, -10]

  - type: jpeg_destroy
    params:
      quality: [2, 8]
      iterations: [3, 10]
