name: CGA Nightmare
description: >
  Trapped inside a 1981 graphics card having a seizure. Cellular
  automata devour the image, CGA palette crushes subtlety, pixel
  sorting melts into streaks, datamosh smears blocks, CRT scan lines
  overlay the wreckage, and byte corruption introduces final glitches.

effects:
  - type: cellular
    params:
      rule: game_of_life
      generations: [15, 40]
      threshold: [100, 180]
      colorize: false

  - type: dither
    params:
      palette: cga

  - type: pixel_sort
    params:
      mode: brightness
      direction: horizontal
      threshold_low: [0.05, 0.2]
      threshold_high: [0.8, 0.95]

  - type: datamosh
    params:
      mode: iframe_remove
      corruption_amount: [0.2, 0.5]
      block_size: [8, 16]

  - type: crt_vhs
    params:
      scan_line_density: [2, 3]
      jitter_amount: [3, 10]
      color_bleed: [1.0, 2.5]
      phosphor_glow: [0.05, 0.15]

  - type: byte_corrupt
    params:
      num_flips: [20, 80]
      mode: flip
