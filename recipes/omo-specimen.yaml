name: Omo Specimen
description: >
  Lab-plate compositing under the thermal camera. One image is shot
  through with six circular die-cuts, takes its place in an Otsu stencil
  with the other two, and the whole plate is read out in false-color
  thermal — the specimen as the instrument sees it. Single output, omo
  batch.

inputs: 3

steps:
  - type: ancient_sixshooter
    image: a

  - type: ancient_stencil
    images: [a, b, c]
    into: canvas
    params:
      output: random

  - type: dither
    image: canvas
    params:
      palette: thermal
      num_colors: [6, 8]
