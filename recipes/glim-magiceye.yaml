name: Glim Magiceye
description: >
  Illusion register — a genuine autostereogram. Image A's luminance
  becomes a depth map, image B the repeating texture. Unfocus or cross
  your eyes until the pattern doubles and A's shapes float free of the
  surface. Single output, glim batch.

inputs: 2

steps:
  - type: stereogram
    images: [a, b]
    into: canvas
    params:
      strip: [90, 130]
      depth_gain: [0.12, 0.22]
      mode: texture
