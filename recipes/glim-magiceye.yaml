name: Glim Magiceye
description: >
  Illusion register — a genuine autostereogram. A's Otsu silhouette
  becomes a crisp floating depth plane; B supplies the dense random-dot
  palette, Magic-Eye style. Unfocus or cross your eyes until the pattern
  doubles and A's shape lifts off the page. Single output, glim batch.

inputs: 2

steps:
  - type: stereogram
    images: [a, b]
    into: canvas
    params:
      strip: [56, 88]
      depth_gain: [0.14, 0.24]
      mode: dots
