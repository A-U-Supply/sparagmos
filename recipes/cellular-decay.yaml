name: Cellular Decay
description: >
  Life devours the image. Cellular automata evolve for dozens of
  generations, fractal mathematics blend in at image-derived coordinates,
  neural doodle paints clashing styles across random regions, seam
  carving melts the evolved forms, Game Boy dithering crushes to
  four shades of green, and pixel sorting streaks the final remains.

effects:
  - type: cellular
    params:
      rule: game_of_life
      generations: [40, 100]
      threshold: [90, 160]
      colorize: true

  - type: fractal_blend
    params:
      opacity: [0.3, 0.55]
      iterations: [100, 300]
      colormap: hot

  - type: neural_doodle
    params:
      num_regions: [4, 8]
      region_size: [0.2, 0.4]
      intensity: [0.5, 0.8]

  - type: seam_carve
    params:
      scale_x: [0.6, 0.8]
      protect_regions: invert

  - type: dither
    params:
      palette: gameboy

  - type: pixel_sort
    params:
      mode: brightness
      direction: vertical
      threshold_low: [0.1, 0.3]
      threshold_high: [0.7, 0.9]
