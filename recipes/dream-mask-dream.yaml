name: Dream Mask Dream
description: >
  A triple dream-mask cycle. First, A is deepdreamed — hallucinations project
  across its surface. Dreamed-A's edges cut into B, producing a composite where
  B lives inside the neural forms. That composite is itself deepdreamed: the
  network hallucinates again, this time over a surface already made of masks
  and dreams. The second-pass dream's luminance cuts into C, so C appears
  only where the re-dreamed composite is bright. That three-layer composite
  is deepdreamed a final time at low intensity — just enough to blur the
  seams between the three dream passes. D is luminance-masked over the
  triple-dreamed result as a final tonal correction. Jpeg destroy collapses
  all three dream cycles into permanent sediment.

inputs: 4

steps:
  - type: deepdream
    image: a
    params:
      iterations: [12, 18]
      octave_scale: [1.4, 1.5]
      jitter: [28, 44]
      learning_rate: [0.012, 0.022]

  - type: mask_composite
    images: [a, b]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 140]
      feather: [6, 12]
      invert: false

  - type: deepdream
    image: canvas
    params:
      iterations: [8, 14]
      octave_scale: [1.3, 1.45]
      jitter: [20, 36]
      learning_rate: [0.008, 0.018]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: luminance
      threshold: [100, 150]
      feather: [7, 14]
      invert: false

  - type: deepdream
    image: canvas
    params:
      iterations: [4, 8]
      octave_scale: [1.2, 1.35]
      jitter: [12, 24]
      learning_rate: [0.004, 0.010]

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: luminance
      threshold: [95, 145]
      feather: [6, 13]
      invert: false

  - type: mask_composite
    images: [canvas, a]
    into: canvas
    params:
      mask_source: edges
      threshold: [100, 155]
      feather: [8, 16]
      invert: true

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [12, 28]
