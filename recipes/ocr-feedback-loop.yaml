name: OCR Feedback Loop
description: >
  A feedback loop of increasingly destructive transformations where
  each step amplifies the previous damage. ImageMagick swirl warps
  geometry, pix2pix adds domain transfer artifacts, pixel sorting
  melts into streaks, spectral processing warps frequencies, byte
  corruption introduces glitch artifacts, channel shift fractures
  color, and JPEG compression compounds everything into oblivion.

effects:
  - type: imagemagick
    params:
      preset: swirl
      degrees: [60, 180]

  - type: pix2pix
    params:
      model: zebra
      intensity: [0.5, 0.8]

  - type: pixel_sort
    params:
      mode: hue
      direction: vertical
      threshold_low: [0.1, 0.25]
      threshold_high: [0.75, 0.9]

  - type: spectral
    params:
      operation: shift
      amount: [0.2, 0.5]

  - type: byte_corrupt
    params:
      num_flips: [80, 250]
      mode: flip

  - type: channel_shift
    params:
      offset_r: [15, 45]
      offset_b: [-40, -15]

  - type: jpeg_destroy
    params:
      quality: [1, 3]
      iterations: [15, 40]
