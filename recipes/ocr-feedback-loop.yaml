name: OCR Feedback Loop
description: >
  The image is swirled by ImageMagick, pixel sorted into streaks,
  corrupted at the byte level, and then JPEG compressed into
  oblivion. A feedback loop of increasingly destructive
  transformations where each step amplifies the previous damage.

effects:
  - type: imagemagick
    params:
      preset: swirl
      degrees: [60, 180]

  - type: pixel_sort
    params:
      mode: hue
      direction: vertical
      threshold_low: [0.1, 0.25]
      threshold_high: [0.75, 0.9]

  - type: byte_corrupt
    params:
      num_flips: [50, 150]
      mode: flip

  - type: jpeg_destroy
    params:
      quality: [1, 3]
      iterations: [10, 30]
