name: Neural Chimera
description: >
  Three images deepdreamed at different neural layers then Voronoi-fragmented
  together. Style transfer re-hallucinates the composite.
  JPEG destruction finalizes.

inputs: 3

steps:
  - type: deepdream
    image: a
    params:
      iterations: [8, 15]
      octave_scale: 1.4
      learning_rate: [0.01, 0.02]

  - type: deepdream
    image: b
    params:
      iterations: [5, 10]
      octave_scale: [1.2, 1.4]
      learning_rate: [0.005, 0.015]

  - type: deepdream
    image: c
    params:
      iterations: [10, 20]
      octave_scale: 1.5
      learning_rate: [0.01, 0.025]

  - type: fragment
    images: [a, b, c]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [12, 30]
      mix_ratio: [0.6, 0.9]

  - type: blend
    images: [canvas, b]
    into: canvas
    params:
      mode: overlay
      strength: [0.3, 0.5]

  - type: style_transfer
    image: canvas
    params:
      style_weight: [500000, 1500000]
      content_weight: 1
      iterations: [10, 25]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [12, 30]
