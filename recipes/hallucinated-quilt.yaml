name: Hallucinated Quilt
description: >
  Five images dreamed at different iteration counts — 5, 10, 15, 20, and 25 —
  creating a spectrum from barely-touched to fully colonized by the network's
  preferred hallucinations. All five dreamed states are mosaic-collaged into a
  single grid: a quilt whose cells contain different depths of neural obsession.
  The grid is then shattered — the quilt structure broken into irregular shards —
  and channel-shifted to fracture the registers of the hallucinated palette.
  A spectral shift displaces the frequency content across the quilt's surface.
  Jpeg destruction, applied twice at different quality levels, compounds the
  damage — the quilt compressed and re-compressed until the dreams fuse permanently
  into artifact.

inputs: 5

steps:
  - type: deepdream
    image: a
    params:
      iterations: [5, 7]
      octave_scale: [1.2, 1.3]
      jitter: [16, 22]
      learning_rate: [0.005, 0.010]

  - type: deepdream
    image: b
    params:
      iterations: [9, 12]
      octave_scale: [1.3, 1.4]
      jitter: [22, 32]
      learning_rate: [0.008, 0.015]

  - type: deepdream
    image: c
    params:
      iterations: [14, 17]
      octave_scale: [1.3, 1.4]
      jitter: [28, 38]
      learning_rate: [0.012, 0.018]

  - type: deepdream
    image: d
    params:
      iterations: [19, 22]
      octave_scale: [1.4, 1.5]
      jitter: [36, 44]
      learning_rate: [0.015, 0.022]

  - type: deepdream
    image: e
    params:
      iterations: [20, 23]
      octave_scale: [1.4, 1.5]
      jitter: [42, 48]
      learning_rate: [0.018, 0.025]

  - type: collage
    images: [a, b, c, d, e]
    into: canvas
    params:
      layout: mosaic

  - type: fragment
    images: [canvas, c]
    into: canvas
    params:
      cut_mode: shatter
      pieces: [12, 30]
      mix_ratio: [0.5, 0.8]
      gap: [3, 10]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [25, 60]
      offset_g: [-12, 12]
      offset_b: [-55, -18]

  - type: spectral
    image: canvas
    params:
      operation: shift
      amount: [0.2, 0.5]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [3, 6]
      iterations: [8, 18]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [12, 28]
