name: Layered Cutwork
description: >
  Three sequential rounds of mask then collage then mask: the image accumulates
  wounds with each pass. First, A's luminance cuts into B — bright areas in A
  reveal B's surface below. The cut composite is strip-collaged with C, splicing
  the wound into alternating columns. C's edge structure then cuts new seams
  through the strips, exposing D beneath the collage grid. Channel shift
  fractures the color registers after the third cut. Seam carve warps the
  remaining geometry, and a final byte corrupt grinds the whole excavation
  into noise at its edges. Each round of mask-collage-mask adds another layer
  of visible depth to the cutwork surface.

inputs: 4

steps:
  - type: pca_decompose
    image: a
    params:
      n_components: [4, 8]
      mode: top

  - type: crt_vhs
    image: b
    params:
      jitter_amount: [7, 16]
      color_bleed: [3.0, 6.5]
      scan_line_density: [2, 3]

  - type: pixel_sort
    image: c
    params:
      mode: hue
      threshold: [40, 95]
      direction: vertical

  - type: dither
    image: d
    params:
      method: floyd_steinberg
      palette: cga

  - type: mask_composite
    images: [b, a]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: collage
    images: [canvas, c]
    into: canvas
    params:
      layout: strips

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: luminance
      threshold: [100, 165]
      feather: [6, 14]
      invert: true

  - type: channel_shift
    image: canvas
    params:
      offset_r: [25, 70]
      offset_g: [-15, 15]
      offset_b: [-55, -15]

  - type: seam_carve
    image: canvas
    params:
      scale_x: [0.6, 0.8]

  - type: byte_corrupt
    image: canvas
    params:
      num_flips: [50, 120]
      mode: flip
