name: Dissolve Cascade
description: >
  Four images dissolved in waves: screen blend accumulates the light, gradient
  masking carves the excess, multiply blend deepens the shadows, luminance masking
  reveals the buried structure underneath. Scatter collage disperses the surviving
  fragments. Each wave of dissolve leaves less and less — the final jpeg compress
  takes what remains.

inputs: 4

steps:
  - type: pixel_sort
    image: a
    params:
      mode: brightness
      threshold: [45, 100]

  - type: channel_shift
    image: b
    params:
      offset_r: [15, 50]
      offset_b: [-40, -10]

  - type: spectral
    image: c
    params:
      operation: bandpass
      amount: [0.35, 0.7]

  - type: crt_vhs
    image: d
    params:
      jitter_amount: [7, 18]
      color_bleed: [3.0, 7.0]
      scan_line_density: [2, 4]

  - type: blend
    images: [a, b]
    into: canvas
    params:
      mode: screen
      strength: [0.55, 0.8]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: gradient
      threshold: [90, 155]
      feather: [6, 16]

  - type: blend
    images: [canvas, d]
    into: canvas
    params:
      mode: multiply
      strength: [0.45, 0.7]

  - type: mask_composite
    images: [canvas, a]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 170]
      feather: [5, 14]
      invert: true

  - type: collage
    images: [canvas, b]
    into: canvas
    params:
      layout: scatter
      rotation: [15, 55]
      scale_variance: [0.15, 0.4]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [14, 38]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [20, 60]
      offset_g: [-12, 12]
      offset_b: [-50, -12]
