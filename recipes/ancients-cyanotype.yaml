name: Ancients Cyanotype
description: >
  Prussian blue cyanotype treatment before stencil compositing. All three
  images get cyanotype toning — tonal curve, highlight bloom, blue LUT,
  paper grain — then each takes a turn as Otsu stencil mask while the
  other two fill as cyanotype-toned foreground and background.

inputs: 3

steps:
  - type: ancient_cyanotype
    images: [a, b, c]
    into: canvas
    params:
      output: all
