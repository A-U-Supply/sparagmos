name: Glim Prism
description: >
  Sparkle register, two images: B is the ground; A's luminance is split
  into pure spectral copies smeared along a light axis and screened onto
  B — A's ghost lands on B as refracted rainbow light, white where the
  copies align, rainbows at every edge. Single output, glim batch.

inputs: 2

steps:
  - type: prism
    images: [a, b]
    into: canvas
    params:
      copies: [5, 9]
      max_offset: [0.03, 0.09]
      axis: [0.0, 360.0]
      ground_dim: [0.3, 0.5]
      light_gain: [1.3, 2.0]
