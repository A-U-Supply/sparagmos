name: Dream Archaeology
description: >
  Each image is PCA-decomposed to different component depths — A stripped to
  near-structural ghost, B to a richer skeleton, C to a mid-density signal,
  D to its deep frequency content, E left raw as undisturbed sediment. Then
  each PCA result is deepdreamed: the network hallucinates over already-abstracted
  material, finding its patterns in ghost-images rather than photographs. The
  five dreamed decompositions are mosaic-collaged into a stratigraphy — layers
  of time and neural obsession tiled together. E's edge skeleton cuts final seams.
  Dither reduces the archaeological surface to a thermal palette: excavation
  rendered as heat signature. Channel shift fractures the registers of the dig.

inputs: 5

steps:
  - type: pca_decompose
    image: a
    params:
      n_components: [2, 4]
      mode: top

  - type: pca_decompose
    image: b
    params:
      n_components: [4, 7]
      mode: top

  - type: pca_decompose
    image: c
    params:
      n_components: [6, 10]
      mode: top

  - type: pca_decompose
    image: d
    params:
      n_components: [8, 14]
      mode: bottom

  - type: deepdream
    image: a
    params:
      iterations: [8, 14]
      octave_scale: [1.3, 1.4]
      jitter: [20, 36]
      learning_rate: [0.008, 0.018]

  - type: deepdream
    image: b
    params:
      iterations: [10, 16]
      octave_scale: [1.3, 1.5]
      jitter: [24, 40]
      learning_rate: [0.010, 0.020]

  - type: deepdream
    image: c
    params:
      iterations: [12, 18]
      octave_scale: [1.4, 1.5]
      jitter: [28, 44]
      learning_rate: [0.012, 0.022]

  - type: deepdream
    image: d
    params:
      iterations: [6, 12]
      octave_scale: [1.2, 1.4]
      jitter: [16, 30]
      learning_rate: [0.006, 0.015]

  - type: collage
    images: [a, b, c, d, e]
    into: canvas
    params:
      layout: mosaic

  - type: mask_composite
    images: [canvas, e]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 140]
      feather: [6, 13]
      invert: false

  - type: dither
    image: canvas
    params:
      method: atkinson
      palette: thermal

  - type: channel_shift
    image: canvas
    params:
      offset_r: [20, 55]
      offset_g: [-12, 12]
      offset_b: [-48, -15]
