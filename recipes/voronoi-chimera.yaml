name: Voronoi Chimera
description: >
  Faces and forms fused at Voronoi cell boundaries. Each image gets a different
  neural/glitch treatment before being fragmented together. The Voronoi tessellation
  creates organic seams where images bleed into each other. Overlay blending
  intensifies the collisions, channel shift fractures the composite, and
  JPEG compression welds the seams permanently.

inputs: 3

steps:
  - type: deepdream
    image: a
    params:
      iterations: [5, 12]
      octave_scale: [1.3, 1.5]
      jitter: [24, 48]

  - type: pixel_sort
    image: b
    params:
      mode: hue
      threshold: [40, 100]

  - type: dither
    image: c
    params:
      method: bayer
      palette: cga

  - type: fragment
    images: [a, b, c]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [15, 35]
      mix_ratio: [0.6, 0.9]
      gap: [0, 3]

  - type: blend
    images: [canvas, a]
    into: canvas
    params:
      mode: overlay
      strength: [0.3, 0.5]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [30, 80]
      offset_b: [-60, -20]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [15, 35]
