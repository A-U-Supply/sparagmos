name: Chimera Engine
description: >
  Three images Voronoi-fragmented into organic cells, blended with a fourth,
  then edge-masked against a fifth to carve new seams through the hybrid body.
  Channel shift fractures its color registers. A second fragmentation breaks
  the chimera into shards of itself, and a final jpeg destroy welds the wound.

inputs: 5

steps:
  - type: deepdream
    image: a
    params:
      iterations: [6, 14]
      octave_scale: [1.3, 1.5]
      jitter: [24, 48]
      learning_rate: [0.008, 0.02]

  - type: pixel_sort
    image: b
    params:
      mode: saturation
      threshold: [35, 85]
      direction: vertical

  - type: dither
    image: c
    params:
      method: floyd_steinberg
      palette: cga

  - type: crt_vhs
    image: d
    params:
      jitter_amount: [7, 18]
      color_bleed: [3.0, 7.0]
      phosphor_glow: [0.1, 0.25]

  - type: channel_shift
    image: e
    params:
      offset_r: [15, 50]
      offset_b: [-40, -10]

  - type: fragment
    images: [a, b, c]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [20, 45]
      mix_ratio: [0.6, 0.9]
      gap: [1, 6]

  - type: blend
    images: [canvas, d]
    into: canvas
    params:
      mode: overlay
      strength: [0.4, 0.65]

  - type: mask_composite
    images: [canvas, e]
    into: canvas
    params:
      mask_source: edges
      threshold: [45, 100]
      feather: [4, 14]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [30, 90]
      offset_g: [-20, 20]
      offset_b: [-70, -20]

  - type: fragment
    images: [canvas, a]
    into: canvas
    params:
      cut_mode: shatter
      pieces: [15, 35]
      mix_ratio: [0.3, 0.6]
      gap: [3, 10]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [15, 40]
