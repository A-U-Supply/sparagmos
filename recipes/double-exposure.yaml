name: Double Exposure
description: >
  Two images burned onto the same film. Screen blending lets the light
  accumulate, multiply adds depth in the shadows. The double-exposed
  image is sonified then JPEG destroyed. Classic photographic accident.

inputs: 2

steps:
  - type: spectral
    image: a
    params:
      mode: bandpass
      low_freq: [0.1, 0.3]
      high_freq: [0.6, 0.9]

  - type: sonify
    image: b
    params:
      effect: reverb
      intensity: [0.3, 0.5]

  - type: blend
    images: [a, b]
    into: canvas
    params:
      mode: screen
      strength: [0.6, 0.9]

  - type: blend
    images: [canvas, a]
    into: canvas
    params:
      mode: multiply
      strength: [0.3, 0.5]

  - type: sonify
    image: canvas
    params:
      effect: distortion
      intensity: [0.2, 0.5]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [12, 30]
