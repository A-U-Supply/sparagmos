name: Feedback Loop
description: >
  Compose, destroy, re-compose the wreckage, destroy again. Two images
  blended, distorted, fragmented back together with originals. The output
  feeds conceptually back into itself, each pass compounding the damage.

inputs: 2

steps:
  - type: blend
    images: [a, b]
    into: canvas
    params:
      mode: screen
      strength: [0.5, 0.8]

  - type: imagemagick
    image: canvas
    params:
      operation: swirl
      degrees: [45, 120]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [15, 50]
      offset_b: [-40, -10]

  - type: fragment
    images: [canvas, a, b]
    into: canvas
    params:
      cut_mode: grid
      pieces: [9, 20]
      mix_ratio: [0.5, 0.8]

  - type: blend
    images: [canvas, b]
    into: canvas
    params:
      mode: overlay
      strength: [0.3, 0.5]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [20, 70]
      offset_g: [-15, 15]
      offset_b: [-60, -20]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [15, 35]
