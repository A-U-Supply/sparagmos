name: Displacement Dream Collage
description: >
  Five images: two deepdreamed into neural hallucinations, displacement-
  stenciled through a third. The displacement-torn dreamed surface is
  mosaiced with the remaining two into a grid composite, then edge-masked
  again. Neural fever warped at the seams, shattered into mosaic tiles.

inputs: 5

steps:
  - type: deepdream
    image: a
    params:
      iterations: [10, 16]
      octave_scale: [1.3, 1.5]
      jitter: [28, 40]
      learning_rate: [0.010, 0.020]

  - type: deepdream
    image: b
    params:
      iterations: [8, 12]
      octave_scale: [1.2, 1.4]
      jitter: [22, 34]
      learning_rate: [0.008, 0.016]

  - type: ancient_displacement
    images: [c, a, b]
    into: canvas
    params:
      strength: [150, 300]
      blur: [2.0, 5.0]
      fill_falloff: [400, 800]
      output: random

  - type: collage
    images: [canvas, d, e]
    into: canvas
    params:
      layout: grid
      rotation: [0, 12]
      scale_variance: [0.0, 0.2]

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 145]
      feather: [5, 12]
      invert: false

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [2, 5]
      iterations: [8, 16]
