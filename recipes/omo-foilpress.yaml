name: Omo Foilpress
description: >
  Material press. Gradient displacement pushes the stencil boundary just
  enough to read as an image hammered into metal — then the relief is
  posterized crisp and finished in a bronze duotone with a contrast
  anchor. Chased metal, not melted mud. Single output, omo batch.

inputs: 3

steps:
  - type: ancient_displacement
    images: [a, b, c]
    into: canvas
    params:
      strength: [10, 18]
      blur: [2, 6]
      output: random

  - type: tone
    image: canvas
    params:
      mode: posterize
      levels: 4
      normalize_first: true
      tint: bronze
