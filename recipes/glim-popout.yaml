name: Glim Popout
description: >
  Illusion register, two images at two depths: A's bright shapes become
  the pure-red plane, B's bright shapes the deep-blue plane.
  Chromostereopsis focuses the wavelengths at different depths, so A
  physically floats in front of B. Single output, glim batch.

inputs: 2

steps:
  - type: chromostereo
    images: [a, b]
    into: canvas
    params:
      cutoff: [0.45, 0.65]
