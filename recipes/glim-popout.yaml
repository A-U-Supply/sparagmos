name: Glim Popout
description: >
  Illusion register — chromostereopsis. The image quantized to pure
  saturated red and deep blue (sometimes with a black mid-band). Long
  and short wavelengths focus at different depths, so the red plane
  physically floats in front of the blue. Single output, glim batch.

inputs: 1

steps:
  - type: chromostereo
    image: canvas
    params:
      bands: [2, 3]
