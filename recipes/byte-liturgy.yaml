name: Byte Liturgy
description: >
  Sacred corruption of the binary word. Datamosh smears the frame,
  raw bytes are flipped then replaced in successive waves, channels
  shift apart, pixel sorting melts corrupted data into streaks,
  sonification converts to distorted audio and back, JPEG delivers
  the final sacrament of generational loss.

effects:
  - type: datamosh
    params:
      mode: mv_swap
      corruption_amount: [0.2, 0.5]
      block_size: [8, 16]

  - type: byte_corrupt
    params:
      num_flips: [200, 800]
      mode: flip

  - type: byte_corrupt
    params:
      num_flips: [50, 200]
      mode: replace

  - type: channel_shift
    params:
      offset_r: [20, 70]
      offset_g: [10, 40]
      offset_b: [-60, -20]

  - type: pixel_sort
    params:
      mode: hue
      direction: vertical
      threshold_low: [0.05, 0.2]
      threshold_high: [0.8, 0.95]

  - type: sonify
    params:
      effect: distortion
      intensity: [0.4, 0.7]

  - type: jpeg_destroy
    params:
      quality: [1, 2]
      iterations: [15, 40]
