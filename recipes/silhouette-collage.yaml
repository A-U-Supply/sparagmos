name: Silhouette Collage
description: >
  Image A is PCA-decomposed to 2 principal components — stripped to the
  barest structural silhouette, a ghost-blueprint of itself. That silhouette
  is imposed as a hard luminance mask onto B: A's form cuts B into A's
  shape, filling the ghost-outline with B's texture. The silhouette-filled
  composite is strip-collaged with C, alternating the cutout form with new
  material in vertical columns. C's edge skeleton then cuts new seams across
  the strips, tracing C's outlines onto the collaged silhouette. Sonify adds
  reverb resonance — the silhouette made to echo. Channel shift fractures
  the color registers. Spectral bandpass clarifies the edge frequencies.
  The result is A's ghost form, filled with B, collaged with C, cut again.

inputs: 4

steps:
  - type: pca_decompose
    image: a
    params:
      n_components: [4, 7]
      mode: top

  - type: channel_shift
    image: b
    params:
      offset_r: [15, 45]
      offset_b: [-35, -10]

  - type: crt_vhs
    image: c
    params:
      jitter_amount: [6, 15]
      color_bleed: [2.5, 5.5]
      scan_line_density: [2, 3]

  - type: pixel_sort
    image: d
    params:
      mode: saturation
      threshold: [40, 90]
      direction: horizontal

  - type: mask_composite
    images: [b, a]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: collage
    images: [canvas, c]
    into: canvas
    params:
      layout: strips

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: luminance
      threshold: [100, 165]
      feather: [6, 14]
      invert: true

  - type: sonify
    image: canvas
    params:
      effect: reverb
      intensity: [0.4, 0.7]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [20, 60]
      offset_g: [-12, 12]
      offset_b: [-50, -15]

  - type: spectral
    image: canvas
    params:
      operation: bandpass
      amount: [0.3, 0.6]
