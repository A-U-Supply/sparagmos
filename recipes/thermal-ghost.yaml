name: Thermal Ghost
description: >
  Noise without signal, texture without structure. Bottom PCA components
  extracted, fractal blend weaves Mandelbrot patterns through the ghost,
  spectral processing warps frequencies, thermal dithering renders as
  heat vision, channel shift pulls color apart, CRT phosphor glow blooms.

effects:
  - type: pca_decompose
    params:
      n_components: [2, 6]
      mode: bottom

  - type: fractal_blend
    params:
      opacity: [0.3, 0.6]
      iterations: [100, 300]
      colormap: hot

  - type: spectral
    params:
      operation: bandpass
      amount: [0.3, 0.6]

  - type: dither
    params:
      palette: thermal

  - type: channel_shift
    params:
      offset_r: [10, 40]
      offset_g: [-15, 15]
      offset_b: [-35, -10]

  - type: crt_vhs
    params:
      scan_line_density: [3, 5]
      jitter_amount: [1, 4]
      color_bleed: [0.5, 1.5]
      phosphor_glow: [0.15, 0.3]
