name: Noise Cathedral
description: >
  Three noise masks at escalating thresholds cut random windows between four
  images, building layered stochastic revelation. Each mask threshold is higher,
  so each subsequent image requires more brightness to show through — lower layers
  glow at the darkest edges, upper layers cut through the brightest zones. Grid
  fragmentation subdivides the cathedral into chapels. Byte corruption collapses
  the vaults.

inputs: 4

steps:
  - type: pca_decompose
    image: a
    params:
      n_components: [3, 8]
      mode: top

  - type: spectral
    image: b
    params:
      operation: bandpass
      amount: [0.4, 0.75]

  - type: deepdream
    image: c
    params:
      iterations: [5, 12]
      octave_scale: [1.3, 1.5]
      jitter: [20, 40]

  - type: pixel_sort
    image: d
    params:
      mode: saturation
      threshold: [40, 90]
      direction: vertical

  - type: mask_composite
    images: [a, b]
    into: canvas
    params:
      mask_source: noise
      threshold: [60, 100]
      feather: [3, 10]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: noise
      threshold: [100, 155]
      feather: [5, 14]

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: noise
      threshold: [145, 210]
      feather: [7, 20]

  - type: fragment
    images: [canvas, a]
    into: canvas
    params:
      cut_mode: grid
      pieces: [16, 40]
      mix_ratio: [0.3, 0.6]
      gap: [2, 8]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [25, 70]
      offset_g: [-18, 18]
      offset_b: [-55, -15]

  - type: byte_corrupt
    image: canvas
    params:
      num_flips: [70, 180]
      mode: inject
