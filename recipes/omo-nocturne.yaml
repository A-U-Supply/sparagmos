name: Omo Nocturne
description: >
  Daguerreotype broadcast. Silver gelatin toning — crushed blacks,
  halation bloom, film grain — composited through a single Otsu stencil,
  received on a dying CRT, and then every legible word from the first
  image is re-stamped crisp over the transmission. The text survives the
  broadcast. Single output, omo batch.

inputs: 3

steps:
  - type: ancient_silver
    images: [a, b, c]
    into: canvas
    params:
      output: random

  - type: crt_vhs
    image: canvas
    params:
      scan_line_density: [2, 4]
      jitter_amount: [1, 2]
      color_bleed: 0.0
      phosphor_glow: [0.05, 0.15]

  - type: text_relic
    images: [a, canvas]
    into: canvas
    params:
      background: keep
      preserve: sharp
      pad: [4, 10]
      min_conf: [40, 60]
