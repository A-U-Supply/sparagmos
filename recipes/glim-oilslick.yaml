name: Glim Oilslick
description: >
  Sparkle register, two images: A is the surface dipped in oil, B is the
  light. B's luminance gradient drives the thin-film interference sheen
  that plays across A — B's shapes visible only as shifts in the color
  of the slick. Single output, glim batch.

inputs: 2

steps:
  - type: iridesce
    images: [a, b]
    into: canvas
    params:
      strength: [0.5, 0.85]
      scale: [6.0, 14.0]
      phase: [0.0, 1.0]
