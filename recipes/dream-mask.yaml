name: Dream Mask
description: >
  Image A is deepdreamed heavily — the network hallucinates eyes, pagodas, dog-faces
  across every surface. The dreamed A's edge skeleton becomes a stencil: those
  hallucinated forms cut directly into B, revealing B's content only where the dream
  drew its lines. That masked composite is blended with C, which has been edge-masked
  against dreamed A again — so the neural forms double-stamp across two layers. D is
  deepdreamed at lower intensity and used as a final luminance mask, its subtle
  hallucinations brightening and dimming the composite in organic surreal patterns.
  Byte corruption and jpeg destruction collapse the layered dreams into permanent damage.

inputs: 4

steps:
  - type: deepdream
    image: a
    params:
      iterations: [15, 20]
      octave_scale: [1.4, 1.5]
      jitter: [32, 48]
      learning_rate: [0.015, 0.025]

  - type: deepdream
    image: d
    params:
      iterations: [5, 10]
      octave_scale: [1.2, 1.3]
      jitter: [16, 28]
      learning_rate: [0.005, 0.012]

  - type: mask_composite
    images: [b, a]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 130]
      feather: [5, 10]
      invert: false

  - type: blend
    images: [canvas, c]
    into: canvas
    params:
      mode: overlay
      strength: [0.5, 0.8]

  - type: mask_composite
    images: [canvas, a]
    into: canvas
    params:
      mask_source: edges
      threshold: [100, 150]
      feather: [8, 15]
      invert: true

  - type: mask_composite
    images: [canvas, d]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 140]
      feather: [5, 12]
      invert: false

  - type: deepdream
    image: canvas
    params:
      iterations: [5, 10]
      octave_scale: [1.2, 1.4]
      jitter: [16, 32]
      learning_rate: [0.005, 0.015]

  - type: byte_corrupt
    image: canvas
    params:
      num_flips: [40, 100]
      mode: flip

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 4]
      iterations: [12, 28]
