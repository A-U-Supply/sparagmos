name: Composite Quilt
description: >
  Images A and B are grid-fragmented into rectangular patches — a quilt of
  borrowed tiles from two different worlds. Image C's luminance then cuts
  through the quilt, bright areas in C revealing one surface, dark areas
  another, the quilt becoming a map of C's tonal structure. The masked quilt
  is Voronoi-fragmented with D, breaking the rectangular grid into organic
  cells that override the grid geometry entirely. Image E's edges then cut
  new seams across the Voronoi, a third masking pass that traces E's
  contours onto the cellular surface. Channel shift fractures the color
  registers. Jpeg destroy welds every layer into compressed monolith.

inputs: 5

steps:
  - type: pixel_sort
    image: a
    params:
      mode: brightness
      threshold: [45, 95]
      direction: horizontal

  - type: crt_vhs
    image: b
    params:
      jitter_amount: [6, 15]
      color_bleed: [2.5, 6.0]
      scan_line_density: [2, 3]

  - type: spectral
    image: c
    params:
      operation: bandpass
      amount: [0.3, 0.6]

  - type: dither
    image: d
    params:
      method: atkinson
      palette: thermal

  - type: pca_decompose
    image: e
    params:
      n_components: [3, 8]
      mode: top

  - type: fragment
    images: [a, b]
    into: canvas
    params:
      cut_mode: grid
      pieces: [12, 28]
      mix_ratio: [0.5, 0.8]
      gap: [2, 6]

  - type: mask_composite
    images: [canvas, c]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: fragment
    images: [canvas, d]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [16, 36]
      mix_ratio: [0.45, 0.75]
      gap: [3, 9]

  - type: mask_composite
    images: [canvas, e]
    into: canvas
    params:
      mask_source: edges
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: channel_shift
    image: canvas
    params:
      offset_r: [25, 70]
      offset_g: [-15, 15]
      offset_b: [-55, -15]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 4]
      iterations: [12, 30]
