name: Tectonic Overlap
description: >
  Continental plates of image data, shifted and overlapping. Four images
  shattered into irregular polygons, scatter-collaged with rotation.
  Seam carving warps the fault lines, JPEG compresses the geological record.

inputs: 4

steps:
  - type: imagemagick
    image: a
    params:
      operation: swirl
      degrees: [30, 90]

  - type: deepdream
    image: b
    params:
      iterations: [3, 8]
      octave_scale: 1.4

  - type: sonify
    image: c
    params:
      effect: echo
      intensity: [0.3, 0.5]

  - type: dither
    image: d
    params:
      method: floyd_steinberg
      palette: ega

  - type: fragment
    images: [a, b, c, d]
    into: canvas
    params:
      cut_mode: shatter
      pieces: [20, 45]
      mix_ratio: [0.7, 1.0]
      gap: [2, 6]

  - type: collage
    images: [canvas, a]
    into: canvas
    params:
      layout: scatter
      rotation: [15, 60]
      scale_variance: [0.1, 0.3]

  - type: seam_carve
    image: canvas
    params:
      scale_x: [0.5, 0.7]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [15, 40]
