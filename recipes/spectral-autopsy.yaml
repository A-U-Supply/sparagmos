name: Spectral Autopsy
description: >
  Dissected in the frequency domain. Spectral shifting displaces
  spatial frequencies, sonification converts to audio reverb and back,
  pix2pix applies simulated domain transfer artifacts, datamosh smears
  blocks across the frame, channel shift fractures color planes,
  and CRT simulation overlays the postmortem.

effects:
  - type: spectral
    params:
      operation: shift
      amount: [0.3, 0.7]

  - type: sonify
    params:
      effect: reverb
      intensity: [0.4, 0.8]

  - type: pix2pix
    params:
      model: vangogh
      intensity: [0.5, 0.8]

  - type: datamosh
    params:
      mode: iframe_remove
      corruption_amount: [0.15, 0.4]
      block_size: [8, 16]

  - type: channel_shift
    params:
      offset_r: [15, 50]
      offset_g: [-10, 10]
      offset_b: [-45, -15]

  - type: crt_vhs
    params:
      scan_line_density: [3, 4]
      jitter_amount: [2, 6]
      color_bleed: [1.0, 2.0]
      phosphor_glow: [0.08, 0.18]
