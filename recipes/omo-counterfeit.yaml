name: Omo Counterfeit
description: >
  Engraved-currency treatment. One image is wobble-eyed into off-axis
  rings, then crossed through TWO contour-following line screens at
  clashing angles — dense guilloche, the security pattern of a banknote
  that never cleared — and printed in a single engraved ink. Single
  output, omo batch.

inputs: 3

steps:
  - type: ancient_wobbleeye
    image: a
    params:
      rings: [3, 6]

  - type: ancient_curvylinescreen
    images: [b, a, c]
    into: canvas
    params:
      frequency: [90, 160]
      angle: [10, 40]
      output: random

  - type: ancient_curvylinescreen
    images: [canvas, a, b]
    into: canvas
    params:
      frequency: [90, 160]
      angle: [50, 80]
      output: random

  - type: tone
    image: canvas
    params:
      mode: posterize
      levels: 3
      normalize_first: true
      tint: ink
      inks: [forest, crimson, cobalt]
