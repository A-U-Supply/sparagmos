name: Recursive Stencil
description: >
  Five-deep recursive stenciling where each image's PCA structure is used as
  a luminance mask for the next. Each image is first PCA-decomposed to 5
  components — enough structure to hold interesting content without going
  near-solid. Then: A's PCA structure masks B, cutting B's ghost into A's
  form. That masked AB composite masks C — A's form, filled with B, now cuts
  C. The AB-masked result masks D — adding one more layer of nested stenciling.
  The ABCD composite masks E — five levels of recursive stenciling, each layer
  visible inside the contour of all the layers before it. Collage assembles
  the stages side by side. Pixel sort and byte corrupt complete the recursive
  surface damage.

inputs: 5

steps:
  - type: pca_decompose
    image: a
    params:
      n_components: [4, 7]
      mode: top

  - type: pca_decompose
    image: b
    params:
      n_components: [4, 7]
      mode: top

  - type: pca_decompose
    image: c
    params:
      n_components: [4, 7]
      mode: top

  - type: pca_decompose
    image: d
    params:
      n_components: [4, 7]
      mode: top

  - type: pca_decompose
    image: e
    params:
      n_components: [4, 7]
      mode: top

  - type: mask_composite
    images: [b, a]
    into: stage_ab
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: mask_composite
    images: [c, stage_ab]
    into: stage_abc
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: mask_composite
    images: [d, stage_abc]
    into: stage_abcd
    params:
      mask_source: edges
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: mask_composite
    images: [e, stage_abcd]
    into: canvas
    params:
      mask_source: luminance
      threshold: [90, 155]
      feather: [6, 14]
      invert: false

  - type: collage
    images: [canvas, stage_ab, stage_abc]
    into: canvas
    params:
      layout: grid
      rotation: [0, 12]
      scale_variance: [0.0, 0.2]

  - type: pixel_sort
    image: canvas
    params:
      mode: brightness
      threshold: [50, 110]
      direction: vertical

  - type: byte_corrupt
    image: canvas
    params:
      num_flips: [60, 140]
      mode: flip
