name: Omo Reliquary
description: >
  Two images: OCR finds every legible word in A and seals it behind
  glass, while everything around the words is replaced by B — washed
  out, moshed, or pixel-sorted. A's inscription survives, embedded in
  the ruins of another image. Single output, omo batch.

inputs: 2

steps:
  - type: text_relic
    images: [a, b]
    into: canvas
    params:
      background: random
      preserve: sharp
      pad: [6, 14]
      min_conf: [35, 55]
