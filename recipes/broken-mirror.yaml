name: Broken Mirror
description: >
  Five images shattered along Voronoi seams with deliberate gaps, as if the
  mirror holding all five reflections has been dropped and the pieces have
  scattered. Channel aberration splits each fragment's color registers.
  Pixel sorting drags luminance through each shard independently. The whole
  becomes an impossible reflection — you can see yourself in it but not together.

inputs: 5

steps:
  - type: channel_shift
    image: a
    params:
      offset_r: [12, 40]
      offset_b: [-35, -10]

  - type: channel_shift
    image: b
    params:
      offset_r: [-30, -8]
      offset_g: [10, 30]

  - type: channel_shift
    image: c
    params:
      offset_g: [-20, -5]
      offset_b: [15, 45]

  - type: pixel_sort
    image: d
    params:
      mode: brightness
      threshold: [50, 110]

  - type: pixel_sort
    image: e
    params:
      mode: saturation
      threshold: [40, 90]

  - type: fragment
    images: [a, b, c, d, e]
    into: canvas
    params:
      cut_mode: voronoi
      pieces: [25, 55]
      mix_ratio: [0.5, 0.85]
      gap: [10, 30]

  - type: channel_shift
    image: canvas
    params:
      offset_r: [20, 55]
      offset_g: [-15, 15]
      offset_b: [-45, -12]

  - type: pixel_sort
    image: canvas
    params:
      mode: hue
      threshold: [35, 85]

  - type: jpeg_destroy
    image: canvas
    params:
      quality: [1, 3]
      iterations: [14, 30]
