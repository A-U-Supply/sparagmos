name: Run Collage Stencil Silver Bot

on:
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'
      frame_duration:
        description: 'GIF frame duration in ms'
        default: '85'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collage stencil silver bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python silver_bot.py \
            --source-channel "${{ inputs.source_channel }}" \
            --post-channel "${{ inputs.post_channel }}" \
            --frame-duration "${{ inputs.frame_duration }}"
